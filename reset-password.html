<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重設密碼 - FITWORKHK</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-950 to-slate-900 min-h-screen flex items-center justify-center p-6">
    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm space-y-4">
        <div class="text-center mb-4">
            <h1 class="text-3xl font-black italic text-blue-800">FITWORK<span class="text-slate-300">HK</span></h1>
            <p class="text-xs text-slate-400 font-bold uppercase tracking-widest mt-1">設定新密碼</p>
        </div>

        <div id="loading" class="text-center text-slate-400 font-semibold py-4">驗證連結中...</div>

        <div id="form" class="space-y-3 hidden">
            <input type="password" id="newPassword"
                placeholder="輸入新密碼（最少 6 位）"
                autocomplete="new-password"
                class="w-full border-2 border-slate-200 p-4 rounded-2xl font-semibold focus:border-blue-500 outline-none"
                minlength="6">
            <input type="password" id="confirmPassword"
                placeholder="再次確認新密碼"
                autocomplete="new-password"
                class="w-full border-2 border-slate-200 p-4 rounded-2xl font-semibold focus:border-blue-500 outline-none"
                minlength="6">
            <button id="submitBtn" onclick="updatePassword()"
                class="w-full bg-emerald-600 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-transform">
                確認更新密碼
            </button>
        </div>

        <div id="error"   class="text-red-500 font-bold text-center text-sm hidden"></div>
        <div id="success" class="text-emerald-600 font-bold text-center text-sm hidden"></div>
    </div>

    <script>
        const SUPA_URL = "https://ajnunehxtiofcphdyhqn.supabase.co";
        const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqbnVuZWh4dGlvZmNwaGR5aHFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMzk4MzcsImV4cCI6MjA5MTcxNTgzN30.vn74xMzEm-fj7Gzhosxvn5UQWozAf_8LrDHXG3kycT4";
        const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

        function showError(msg) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('form').classList.add('hidden');
            const el = document.getElementById('error');
            el.textContent = msg;
            el.classList.remove('hidden');
        }
        function showSuccess(msg) {
            document.getElementById('form').classList.add('hidden');
            const el = document.getElementById('success');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        async function init() {
            const params = new URLSearchParams(window.location.hash.substring(1));
            const accessToken  = params.get('access_token');
            const refreshToken = params.get('refresh_token') || '';
            const type         = params.get('type');

            if (type !== 'recovery' || !accessToken) {
                showError('連結無效或已過期，請重新申請重設密碼。');
                return;
            }
            const { error } = await sb.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
            if (error) {
                showError('連結已過期，請重新申請重設密碼。');
                return;
            }
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('form').classList.remove('hidden');
        }

        async function updatePassword() {
            const newPw     = document.getElementById('newPassword').value;
            const confirmPw = document.getElementById('confirmPassword').value;
            if (newPw.length < 6)    { alert('密碼最少需要 6 個字元'); return; }
            if (newPw !== confirmPw) { alert('兩次密碼輸入不一致');    return; }

            const btn = document.getElementById('submitBtn');
            btn.disabled    = true;
            btn.textContent = '更新中...';

            const { error } = await sb.auth.updateUser({ password: newPw });
            if (error) {
                btn.disabled    = false;
                btn.textContent = '確認更新密碼';
                alert('更新失敗：' + error.message);
            } else {
                showSuccess('✅ 密碼已成功更新！3 秒後返回登入頁面...');
                await sb.auth.signOut();
                setTimeout(() => { window.location.href = '/'; }, 3000);
            }
        }

        init();
    </script>
</body>
</html>
