<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重設密碼 - FITWORKHK</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="container">
        <h2>設置新密碼</h2>
        <form id="resetPasswordForm">
            <div class="form-group">
                <label for="newPassword">新密碼：</label>
                <input type="password" id="newPassword" required minlength="6">
            </div>
            <div class="form-group">
                <label for="confirmPassword">確認新密碼：</label>
                <input type="password" id="confirmPassword" required minlength="6">
            </div>
            <button type="submit">更新密碼</button>
        </form>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md space-y-4">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-black text-blue-800 italic">FITWORKHK</h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">設定新密碼</p>
        </div>
 
        <div id="loading" class="text-center text-slate-400 font-bold py-4">驗證連結中...</div>
 
        <div id="form" class="space-y-3 hidden">
            <input
                type="password"
                id="newPassword"
                placeholder="輸入新密碼（最少 6 位）"
                autocomplete="new-password"
                class="w-full border-2 p-4 rounded-2xl font-bold"
                minlength="6"
            >
            <input
                type="password"
                id="confirmPassword"
                placeholder="再次確認新密碼"
                autocomplete="new-password"
                class="w-full border-2 p-4 rounded-2xl font-bold"
                minlength="6"
            >
            <button
                id="submitBtn"
                onclick="updatePassword()"
                class="w-full bg-emerald-600 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95"
            >
                確認更新密碼
            </button>
        </div>
 
        <div id="error" class="text-red-500 font-bold text-center hidden"></div>
        <div id="success" class="text-emerald-600 font-bold text-center hidden"></div>
</div>

 
<script>
        // 初始化 Supabase（使用您的實際設定）
        const supabaseUrl = 'YOUR_SUPABASE_URL';
        const supabaseKey = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('resetPasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (newPassword !== confirmPassword) {
                alert('密碼確認不一致');
        const SUPA_URL = "https://ajnunehxtiofcphdyhqn.supabase.co";
        const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqbnVuZWh4dGlvZmNwaGR5aHFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMzk4MzcsImV4cCI6MjA5MTcxNTgzN30.vn74xMzEm-fj7Gzhosxvn5UQWozAf_8LrDHXG3kycT4";
 
        // 注意：這裡用 window.supabase.createClient（不是 supabase.createClient）
        const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
 
        function showError(msg) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error').textContent = msg;
            document.getElementById('error').classList.remove('hidden');
        }
        function showSuccess(msg) {
            document.getElementById('form').classList.add('hidden');
            document.getElementById('success').textContent = msg;
            document.getElementById('success').classList.remove('hidden');
        }
 
        // 從 URL hash fragment 取得 token
        // Supabase 重設密碼連結格式：
        //   https://your-site.netlify.app/reset-password.html#access_token=xxx&type=recovery
        async function init() {
            const hash = window.location.hash.substring(1); // 去掉 #
            const params = new URLSearchParams(hash);
 
            const accessToken = params.get('access_token');
            const refreshToken = params.get('refresh_token');
            const type = params.get('type');
 
            if (type !== 'recovery' || !accessToken) {
                showError('連結無效或已過期，請重新申請重設密碼。');
                return;
            }
 
            // 用 token 設定 session，讓後續 updateUser 知道是哪個用戶
            const { error } = await sb.auth.setSession({
                access_token: accessToken,
                refresh_token: refreshToken || ''
            });
 
            if (error) {
                showError('連結已過期，請重新申請重設密碼。');
                return;
            }
 
            // 驗證成功，顯示表單
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('form').classList.remove('hidden');
        }
 
        async function updatePassword() {
            const newPw = document.getElementById('newPassword').value;
            const confirmPw = document.getElementById('confirmPassword').value;
 
            if (newPw.length < 6) {
                alert('密碼最少需要 6 個字元');
                return;
            }
            if (newPw !== confirmPw) {
                alert('兩次密碼輸入不一致');
return;
}
            
            try {
                const { error } = await supabase.auth.updateUser({
                    password: newPassword
                });
                
                if (error) throw error;
                
                alert('密碼已成功更新！');
                window.location.href = '/login.html'; // 導向到登入頁面
                
            } catch (error) {
                console.error('更新密碼失敗:', error);
 
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '更新中...';
 
            const { error } = await sb.auth.updateUser({ password: newPw });
 
            if (error) {
                btn.disabled = false;
                btn.textContent = '確認更新密碼';
alert('更新失敗：' + error.message);
            } else {
                showSuccess('✅ 密碼已成功更新！3 秒後跳轉至登入頁面...');
                await sb.auth.signOut();
                setTimeout(() => {
                    window.location.href = '/';
                }, 3000);
}
        });
        }
 
        // 頁面載入時執行
        init();
</script>
</body>
</html>
