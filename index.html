<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitworkhk 專業管理系統 V5.5</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [v-cloak] { display: none; }
        .tab-active { border-bottom: 4px solid #1d4ed8; color: #1d4ed8; font-weight: 800; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="app" v-cloak>
        
        <div v-if="showResetPasswordInput" class="min-h-screen flex items-center justify-center p-6 bg-orange-600">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md">
                <h2 class="text-3xl font-black text-center mb-2 text-orange-600 italic tracking-tighter">RESET</h2>
                <div class="space-y-6">
                    <input v-model="newPassword" type="password" placeholder="輸入新密碼" class="w-full border-2 border-gray-100 rounded-2xl px-4 py-4 outline-none focus:border-orange-500">
                    <button @click="updatePassword" :disabled="loading" class="w-full bg-orange-600 text-white font-black py-4 rounded-2xl shadow-xl hover:scale-[1.02] transition-all">確認修改</button>
                </div>
            </div>
        </div>

        <div v-else-if="user" class="min-h-screen pb-20">
            <header class="bg-white shadow-sm sticky top-0 z-50">
                <div class="container mx-auto px-4 py-3 flex justify-between items-center">
                    <div class="text-xl font-black text-blue-700 italic tracking-tighter">FITWORKHK <span class="text-[10px] font-bold text-gray-300">V5.5</span></div>
                    <nav class="flex space-x-1 text-xs font-bold">
                        <button v-for="t in ['dashboard', 'clients', 'income', 'expense']" :key="t" 
                                @click="currentTab = t" :class="{'tab-active': currentTab === t}" class="px-3 py-2 uppercase tracking-tighter">
                            {{ {dashboard:'儀表板', clients:'客戶表', income:'收入', expense:'支出'}[t] }}
                        </button>
                        <button @click="logout" class="ml-2 text-red-400">登出</button>
                    </nav>
                </div>
            </header>

            <main class="container mx-auto px-4 py-6 max-w-4xl">
                <div v-if="currentTab === 'dashboard'" class="space-y-6">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="bg-white p-5 rounded-3xl shadow-sm border-b-4 border-blue-500">
                            <p class="text-[10px] text-gray-400 font-bold uppercase">總收入</p>
                            <p class="text-2xl font-black text-blue-600">${{ totalIncome }}</p>
                        </div>
                        <div class="bg-white p-5 rounded-3xl shadow-sm border-b-4 border-emerald-500">
                            <p class="text-[10px] text-gray-400 font-bold uppercase">預估利潤</p>
                            <p class="text-2xl font-black text-emerald-600">${{ estimatedProfit }}</p>
                        </div>
                    </div>
                    </div>

                <div v-if="currentTab === 'clients'" class="space-y-4">
                    <button @click="openClientModal()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg">+ 新增客戶</button>
                    <div v-for="client in filteredClients" :key="client.id" class="bg-white p-4 rounded-2xl shadow-sm">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-bold text-lg">{{ client.name }}</h3>
                                <p class="text-xs text-gray-400">類別: {{ client.type }} | 來源: {{ client.branch }}</p>
                            </div>
                            <div class="text-right">
                                <span class="bg-blue-50 text-blue-600 text-[10px] px-2 py-1 rounded-md font-bold">{{ client.plan }}</span>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <div v-else class="min-h-screen flex items-center justify-center p-6 bg-blue-700">
            </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        // Supabase 配置需在此填入您的 URL 與 Key
        const supabase = supabase.createClient('YOUR_SUPABASE_URL', 'YOUR_SUPABASE_ANON_KEY');

        createApp({
            setup() {
                const user = ref(null);
                const currentTab = ref('dashboard');
                const clients = ref(JSON.parse(localStorage.getItem('fitwork_clients') || '[]'));
                
                // 核心利潤邏輯 (整合 V3)
                const calculateProfit = (client) => {
                    let profit = 0;
                    if (client.plan === '35點套票') {
                        // 根據新舊客區分利潤邏輯
                        profit = client.isNew ? 1200 : 800; 
                    }
                    return profit;
                };

                const totalIncome = computed(() => {
                    return clients.value.reduce((sum, c) => sum + (Number(c.price) || 0), 0);
                });

                // 身份驗證與初始化邏輯
                onMounted(() => {
                    supabase.auth.getSession().then(({ data }) => {
                        user.value = data.session?.user || null;
                    });
                });

                return {
                    user, currentTab, clients, totalIncome,
                    logout: () => supabase.auth.signOut(),
                    // 其他方法...
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
