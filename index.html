<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitworkhk 雲端管理系統 V4</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        [v-cloak] { display: none; }
        .tab-active { border-bottom: 4px solid #1d4ed8; color: #1d4ed8; font-weight: 800; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="app" v-cloak class="min-h-screen">
        
        <div v-if="!user" class="min-h-screen flex items-center justify-center p-6 bg-blue-900">
            <div class="bg-white p-8 rounded-[2rem] shadow-2xl w-full max-w-md">
                <h2 class="text-3xl font-black text-center mb-6 text-blue-900">FITWORKHK</h2>
                <div class="space-y-4">
                    <input v-model="auth.email" type="email" placeholder="管理員郵箱" class="w-full border-2 border-gray-100 rounded-xl px-4 py-3">
                    <input v-model="auth.password" type="password" placeholder="密碼" class="w-full border-2 border-gray-100 rounded-xl px-4 py-3">
                    <div class="flex space-x-2">
                        <button @click="handleLogin" class="flex-1 bg-blue-600 text-white font-bold py-3 rounded-xl">登入</button>
                        <button @click="handleSignUp" class="flex-1 bg-gray-100 text-gray-500 font-bold py-3 rounded-xl">註冊</button>
                    </div>
                </div>
            </div>
        </div>

        <div v-else>
            <header class="bg-white shadow-md sticky top-0 z-50">
                <div class="container mx-auto px-4 py-3 flex justify-between items-center">
                    <div class="text-xl font-black text-blue-700">FITWORKHK <span class="text-xs font-normal text-gray-400">CLOUD</span></div>
                    <nav class="flex space-x-1 text-sm">
                        <button @click="currentTab = 'dashboard'" :class="{'tab-active': currentTab === 'dashboard'}" class="px-2 py-2">儀表板</button>
                        <button @click="currentTab = 'clients'" :class="{'tab-active': currentTab === 'clients'}" class="px-2 py-2">客戶表</button>
                        <button @click="currentTab = 'income'" :class="{'tab-active': currentTab === 'income'}" class="px-2 py-2">收入</button>
                        <button @click="handleLogout" class="px-2 py-2 text-red-500 font-bold">登出</button>
                    </nav>
                </div>
            </header>

            <main class="container mx-auto px-4 py-6 max-w-4xl">
                <div v-if="currentTab === 'dashboard'" class="grid grid-cols-2 gap-4">
                    <div class="bg-white p-5 rounded-3xl shadow-sm border-b-4 border-blue-500">
                        <p class="text-xs text-gray-400 font-bold mb-1">營業額</p>
                        <p class="text-2xl font-black text-blue-600">${{ stats.revenue }}</p>
                    </div>
                    <div class="bg-white p-5 rounded-3xl shadow-sm border-b-4 border-green-500">
                        <p class="text-xs text-gray-400 font-bold mb-1">總客戶數</p>
                        <p class="text-2xl font-black text-green-600">{{ clients.length }}</p>
                    </div>
                    <div class="col-span-2 text-center py-10 text-gray-400" v-if="loading">雲端同步中...</div>
                </div>

                <div v-if="currentTab === 'clients'" class="space-y-4">
                    <div class="flex space-x-2">
                        <input v-model="clientSearch" placeholder="搜尋..." class="flex-1 bg-white border-0 shadow-sm rounded-2xl px-4 py-3">
                        <button @click="openClientModal()" class="bg-blue-600 text-white px-4 py-3 rounded-2xl font-bold">+</button>
                    </div>
                    <div class="bg-white rounded-3xl shadow-sm overflow-hidden">
                        <table class="w-full text-left text-sm">
                            <tbody class="divide-y">
                                <tr v-for="c in filteredClients" :key="c.id">
                                    <td class="px-6 py-4">
                                        <div class="font-bold">{{ c.name }}</div>
                                        <div class="text-xs text-gray-400">{{ c.phone }}</div>
                                    </td>
                                    <td class="px-6 py-4 text-right">
                                        <div class="text-xs font-bold text-blue-500">{{ c.branch }}</div>
                                        <div class="text-[10px] text-gray-300">續卡 {{ c.renewal_count }} 次</div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                
                </main>
        </div>

        </div>

    <script>
        // --- 請填入你的 Supabase 資訊 ---
        const SUPABASE_URL = "https://ajnunehxtiofcphdyhqn.supabase.co";
        const SUPABASE_ANON_KEY = "https://ajnunehxtiofcphdyhqn.supabase.co";
        const supabase = Object.assign(supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY));

        const { createApp, ref, computed, onMounted } = Vue;

        createApp({
            setup() {
                const user = ref(null);
                const currentTab = ref('dashboard');
                const loading = ref(false);
                const auth = ref({ email: '', password: '' });
                const clients = ref([]);
                const stats = ref({ revenue: 0 });
                const clientSearch = ref('');

                // --- 身份驗證 ---
                const handleSignUp = async () => {
                    const { data, error } = await supabase.auth.signUp(auth.value);
                    if (error) alert(error.message);
                    else alert('請檢查郵箱確認信！');
                };

                const handleLogin = async () => {
                    const { data, error } = await supabase.auth.signInWithPassword(auth.value);
                    if (error) alert(error.message);
                    else {
                        user.value = data.user;
                        fetchData();
                    }
                };

                const handleLogout = async () => {
                    await supabase.auth.signOut();
                    user.value = null;
                };

                // --- 資料同步 ---
                const fetchData = async () => {
                    loading.ref = true;
                    // 抓取客戶
                    const { data: clientsData } = await supabase.from('clients').select('*').order('created_at', { ascending: false });
                    clients.value = clientsData || [];
                    
                    // 抓取營業額
                    const { data: incomeData } = await supabase.from('incomes').select('revenue');
                    stats.value.revenue = (incomeData || []).reduce((s, i) => s + i.revenue, 0);
                    
                    loading.ref = false;
                };

                const filteredClients = computed(() => {
                    if (!clientSearch.value) return clients.value;
                    return clients.value.filter(c => c.name.includes(clientSearch.value));
                });

                onMounted(async () => {
                    const { data } = await supabase.auth.getUser();
                    if (data.user) {
                        user.value = data.user;
                        fetchData();
                    }
                });

                return {
                    user, currentTab, auth, handleLogin, handleSignUp, handleLogout,
                    clients, stats, loading, clientSearch, filteredClients
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
