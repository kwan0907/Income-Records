<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitworkhk 客戶管理系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>[v-cloak] { display: none; }</style>
</head>
<body class="bg-slate-50">
    <div id="app" v-cloak>
        
        <div v-if="!user" class="min-h-screen flex items-center justify-center p-6 bg-blue-900">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md">
                <h2 class="text-3xl font-black text-center mb-2 text-blue-900">FITWORKHK</h2>
                <p class="text-center text-gray-400 text-[10px] mb-8 font-bold uppercase tracking-widest">{{ authModeText }}</p>

                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 px-1">管理員/客戶電子郵件</label>
                        <input v-model="email" type="email" placeholder="email@example.com" class="w-full border-2 border-gray-100 rounded-2xl px-4 py-4 outline-none focus:border-blue-500 transition-all">
                    </div>

                    <div v-if="authMode !== 'reset'">
                        <label class="text-[10px] font-bold text-gray-400 px-1">帳戶密碼</label>
                        <input v-model="password" type="password" placeholder="••••••••" class="w-full border-2 border-gray-100 rounded-2xl px-4 py-4 outline-none focus:border-blue-500 transition-all">
                    </div>

                    <button @click="handleAuth" :disabled="loading" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl shadow-blue-100 mt-4 active:scale-95 transition-transform disabled:bg-gray-300">
                        {{ loading ? '同步處理中...' : authButtonText }}
                    </button>

                    <div class="flex justify-between px-2 text-xs font-bold mt-4">
                        <button v-if="authMode === 'login'" @click="authMode = 'signup'" class="text-blue-500">申請新帳號</button>
                        <button v-if="authMode === 'login'" @click="authMode = 'reset'" class="text-gray-400">忘記密碼？</button>
                        <button v-if="authMode !== 'login'" @click="authMode = 'login'" class="text-blue-500 w-full text-center">返回登入畫面</button>
                    </div>
                </div>
            </div>
        </div>

        <div v-else class="min-h-screen">
            <header class="bg-white p-4 shadow-sm flex justify-between items-center sticky top-0 z-10">
                <span class="font-black text-blue-600 text-xl tracking-tighter text-blue-900">FITWORKHK</span>
                <div class="flex items-center space-x-3">
                    <span class="text-[10px] bg-blue-50 text-blue-500 px-3 py-1 rounded-full font-bold">{{ user.email }}</span>
                    <button @click="logout" class="text-xs font-bold text-red-400 hover:text-red-600">登出</button>
                </div>
            </header>
            
            <main class="p-6 text-center max-w-md mx-auto">
                <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-gray-100">
                    <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4">
                        <span class="text-3xl text-blue-500">👤</span>
                    </div>
                    <h1 class="text-2xl font-black text-blue-900">歡迎回來，管理員</h1>
                    <p class="text-gray-400 mt-2 text-sm">雲端數據庫連線正常</p>
                    
                    <div class="mt-8 pt-8 border-t border-gray-50 text-left">
                        <p class="text-[10px] font-black text-gray-300 uppercase mb-4">系統狀態</p>
                        <div class="flex items-center text-green-500 font-bold text-sm mb-2">
                            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse mr-2"></span>
                            身份驗證：已通過
                        </div>
                        <div class="flex items-center text-blue-500 font-bold text-sm">
                            <span class="w-2 h-2 bg-blue-500 rounded-full mr-2"></span>
                            權限等級：全域存取
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // 配置資訊 (自動清理空格)
        const SUPABASE_URL = "https://ajnunehxtiofcphdyhqn.supabase.co".trim();
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqbnVuZWh4dGlvZmNwaGR5aHFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMzk4MzcsImV4cCI6MjA5MTcxNTgzN30.vn74xMzEm-fj7Gzhosxvn5UQWozAf_8LrDHXG3kycT4".trim();
        
        // 初始化連線
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const { createApp, ref, computed, onMounted } = Vue;
        createApp({
            setup() {
                const user = ref(null);
                const email = ref('');
                const password = ref('');
                const loading = ref(false);
                const authMode = ref('login');

                const authModeText = computed(() => {
                    if (authMode.value === 'login') return 'Cloud Management Login';
                    if (authMode.value === 'signup') return 'System Registration';
                    return 'Password Recovery';
                });

                const authButtonText = computed(() => {
                    if (authMode.value === 'login') return '確認登入系統';
                    if (authMode.value === 'signup') return '立即建立帳號';
                    return '發送重設驗證碼';
                });

                const handleAuth = async () => {
                    if (!email.value) return alert("請填寫電子郵件地址");
                    if (authMode.value !== 'reset' && !password.value) return alert("請輸入密碼");
                    
                    loading.value = true;
                    try {
                        if (authMode.value === 'login') {
                            const { data, error } = await _supabase.auth.signInWithPassword({ email: email.value, password: password.value });
                            if (error) throw error;
                            user.value = data.user;
                        } else if (authMode.value === 'signup') {
                            const { data, error } = await _supabase.auth.signUp({ email: email.value, password: password.value });
                            if (error) throw error;
                            alert("帳號已提交！\n\n重要：請前往您的郵箱查收【驗證郵件】，點擊連結後才能正式啟動帳號。");
                            authMode.value = 'login';
                        } else if (authMode.value === 'reset') {
                            const { error } = await _supabase.auth.resetPasswordForEmail(email.value, {
                                redirectTo: window.location.origin, // 自動抓取目前的網址作為跳轉路徑
                            });
                            if (error) throw error;
                            alert("重設連結已發送！請檢查郵箱。");
                            authMode.value = 'login';
                        }
                    } catch (err) {
                        alert("系統連線異常: " + err.message);
                    } finally {
                        loading.value = false;
                    }
                };

                const logout = async () => { 
                    await _supabase.auth.signOut(); 
                    user.value = null; 
                    email.value = '';
                    password.value = '';
                };

                onMounted(async () => {
                    const { data: { user: _user } } = await _supabase.auth.getUser();
                    if (_user) user.value = _user;
                });

                return { user, email, password, loading, authMode, authModeText, authButtonText, handleAuth, logout };
            }
        }).mount('#app');
    </script>
</body>
</html>
