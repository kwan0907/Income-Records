<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fitworkhk V8.6 FINAL FIX</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [v-cloak] { display: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-active { color: #1d4ed8; border-bottom: 4px solid #1d4ed8; font-weight: 900; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 23, 42, 0.9); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 text-sm">
    <div id="app" v-cloak class="min-h-screen">
        
        <div v-if="!session" class="min-h-screen flex items-center justify-center p-4 bg-slate-900">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md space-y-6 border border-slate-100">
                <div class="text-center">
                    <h1 class="text-3xl font-black text-blue-800 italic tracking-tighter">FITWORKHK <span class="text-xs text-slate-400 not-italic">CLOUD</span></h1>
                    <p class="text-[10px] font-black text-slate-400 mt-2 uppercase tracking-[0.2em]">Secure Portal</p>
                </div>

                <div class="space-y-4">
                    <div v-if="authError" class="bg-red-50 p-4 rounded-xl text-[11px] font-bold text-red-600 border border-red-100 text-center">
                        {{ authError }}
                    </div>
                    
                    <input type="email" v-model="authForm.email" placeholder="Email" class="w-full border-2 border-slate-100 p-4 rounded-2xl font-bold outline-none focus:border-blue-600">
                    <input v-if="authState !== 'forgot'" type="password" v-model="authForm.password" placeholder="Password" class="w-full border-2 border-slate-100 p-4 rounded-2xl font-bold outline-none focus:border-blue-600">
                    
                    <button @click="handleAuth" :disabled="loading" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 disabled:opacity-50 transition-all text-sm">
                        {{ loading ? '請稍候...' : (authState === 'login' ? '登入' : (authState === 'register' ? '註冊' : '發送重設郵件')) }}
                    </button>
                </div>

                <div class="flex justify-between text-[11px] font-black text-slate-400 pt-2 px-2">
                    <button v-if="authState !== 'login'" @click="authState = 'login'; authError=''">返回登入</button>
                    <button v-if="authState === 'login'" @click="authState = 'register'; authError=''">註冊帳號</button>
                    <button v-if="authState === 'login'" @click="authState = 'forgot'; authError=''">忘記密碼？</button>
                </div>
            </div>
        </div>

        <div v-else class="pb-24">
            <header class="bg-white border-b sticky top-0 z-50 p-4 flex justify-between items-center shadow-sm">
                <div class="text-xl font-black text-blue-800 italic tracking-tighter">FITWORKHK</div>
                <div class="flex items-center gap-3">
                    <span class="text-[10px] font-bold text-slate-500 bg-slate-100 px-2 py-1 rounded-md">{{ session.user.email }}</span>
                    <button @click="handleLogout" class="text-xs font-bold text-red-500">登出</button>
                </div>
            </header>

            <nav class="flex overflow-x-auto bg-white border-b text-[10px] font-black uppercase sticky top-[61px] z-40 no-scrollbar">
                <button v-for="t in tabs" @click="currentTab = t.id" :class="{'tab-active': currentTab === t.id}" class="py-4 px-6 flex-1 text-center whitespace-nowrap">{{ t.name }}</button>
            </nav>

            <main class="container mx-auto p-4 max-w-3xl space-y-4">
                <section v-if="currentTab === 'dashboard'" class="space-y-4">
                    <div class="bg-slate-900 p-7 rounded-[2.5rem] text-white shadow-2xl">
                        <p class="text-[9px] font-black text-blue-400 uppercase tracking-widest">總利潤</p>
                        <p class="text-5xl font-black italic mt-2">${{ totalProfit.toFixed(1) }}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-white p-5 rounded-[1.8rem] shadow-sm border">
                            <p class="text-[9px] text-slate-400 font-black uppercase mb-4">分店分佈</p>
                            <div v-for="b in ['觀塘','中環','佐敦']" class="flex justify-between text-xs font-bold mb-1">
                                <span>{{ b }}</span><span>{{ branchStats[b] || 0 }}</span>
                            </div>
                        </div>
                        <div class="bg-white p-5 rounded-[1.8rem] shadow-sm border flex flex-col justify-between">
                            <p class="text-[9px] text-slate-400 font-black uppercase">馬拉松活躍</p>
                            <span class="text-emerald-600 font-black text-3xl">{{ marathonStats.active }}</span>
                        </div>
                    </div>
                </section>

                <section v-if="currentTab === 'exercise'" class="bg-white p-7 rounded-[2.5rem] shadow-sm border space-y-6">
                    <h3 class="font-black italic text-blue-700 uppercase text-lg">Exercise POS</h3>
                    <select v-model="eForm.clientId" class="w-full bg-slate-50 p-4 rounded-2xl border-2 font-bold outline-none">
                        <option :value="null">-- 選擇客戶 --</option>
                        <option v-for="c in clients" :value="c.id">{{ c.name }}</option>
                    </select>
                    <div class="grid grid-cols-2 gap-3">
                        <button v-for="p in exerciseProducts" @click="eForm.type=p.id" :class="eForm.type===p.id?'bg-blue-600 text-white shadow-lg':'bg-white border-2'" class="p-4 rounded-2xl font-black text-xs">
                            {{ p.name }}<br><span class="opacity-70">${{ p.price }}</span>
                        </button>
                    </div>
                    <div v-if="eForm.type !== 'trial'" class="bg-slate-50 p-4 rounded-2xl space-y-2 border-2 border-dashed">
                        <label class="flex items-center gap-3 font-bold text-xs"><input type="checkbox" v-model="eForm.isFirstTime"> 新客優惠 (-$98)</label>
                        <label class="flex items-center gap-3 font-bold text-xs text-purple-600"><input type="checkbox" v-model="eForm.isReferralFree"> 轉介紹免費</label>
                    </div>
                    <button @click="saveExercise" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-xl">確認入帳 (${{ exerciseCalc }})</button>
                </section>

                <section v-if="currentTab === 'clients'" class="space-y-4">
                    <div class="flex gap-2">
                        <input v-model="cSearch" placeholder="搜尋客戶..." class="flex-1 p-4 rounded-2xl border-2 font-bold outline-none focus:border-blue-600">
                        <button @click="openClientModal(null)" class="bg-blue-600 text-white px-6 rounded-2xl font-black shadow-lg">+</button>
                    </div>
                    <div v-for="c in filteredClients" @click="openClientModal(c)" class="bg-white p-5 rounded-2xl border-l-8 border-blue-600 flex justify-between shadow-sm cursor-pointer">
                        <div>
                            <div class="font-black">{{ c.name }} <span v-if="c.marathon" class="text-[8px] bg-emerald-500 text-white px-1 py-0.5 rounded ml-1">MARATHON</span></div>
                            <div class="text-[10px] text-slate-400 font-bold mt-1">{{ c.phone }} | {{ c.branch }}</div>
                        </div>
                        <div v-if="c.source === '轉介紹'" class="text-purple-600 font-black text-[10px]">轉介紹</div>
                    </div>
                </section>
            </main>
        </div>

        <div v-if="showClientModal" class="modal-overlay">
            <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 space-y-4">
                <h3 class="font-black text-xl border-b pb-4">客戶資料編輯</h3>
                <input v-model="clientForm.name" placeholder="姓名" class="w-full border-2 p-4 rounded-2xl font-bold">
                <input v-model="clientForm.phone" placeholder="電話" class="w-full border-2 p-4 rounded-2xl font-bold">
                <div class="grid grid-cols-2 gap-3">
                    <select v-model="clientForm.branch" class="border-2 p-3 rounded-xl font-bold"><option value="觀塘">觀塘</option><option value="中環">中環</option><option value="佐敦">佐敦</option></select>
                    <select v-model="clientForm.source" class="border-2 p-3 rounded-xl font-bold"><option value="廣告">廣告</option><option value="轉介紹">轉介紹</option></select>
                </div>
                <label class="flex items-center gap-3 p-4 bg-slate-50 rounded-xl font-black border-2"><input type="checkbox" v-model="clientForm.marathon"> 活躍馬拉松成員</label>
                <div class="flex gap-3 pt-4"><button @click="showClientModal=false" class="flex-1 p-4 bg-slate-100 rounded-2xl font-black">取消</button><button @click="saveClient" class="flex-1 p-4 bg-blue-600 text-white rounded-2xl font-black">儲存</button></div>
            </div>
        </div>

    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        // 修正：將變數名改為 sb，避免與全局 supabase 衝突
        const SUPABASE_URL = "https://ajnunehxtiofcphdyhqn.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqbnVuZWh4dGlvZmNwaGR5aHFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMzk4MzcsImV4cCI6MjA5MTcxNTgzN30.vn74xMzEm-fj7Gzhosxvn5UQWozAf_8LrDHXG3kycT4";
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        createApp({
            setup() {
                const session = ref(null);
                const loading = ref(false);
                const authState = ref('login');
                const authError = ref('');
                const authForm = ref({ email: '', password: '' });
                const currentTab = ref('dashboard');
                const tabs = [{id:'dashboard',name:'總覽'},{id:'clients',name:'CRM'},{id:'exercise',name:'運動'}];

                const clients = ref([]);
                const sales = ref([]);

                // 認證邏輯
                const handleAuth = async () => {
                    loading.value = true; authError.value = '';
                    try {
                        let result;
                        if (authState.value === 'login') {
                            result = await sb.auth.signInWithPassword(authForm.value);
                        } else if (authState.value === 'register') {
                            result = await sb.auth.signUp(authForm.value);
                            if (!result.error) alert("註冊成功，請檢查郵件激活帳號！");
                        } else {
                            result = await sb.auth.resetPasswordForEmail(authForm.value.email);
                            if (!result.error) alert("重設郵件已發送");
                        }
                        if (result.error) throw result.error;
                        if (result.data?.session) session.value = result.data.session;
                    } catch (e) {
                        authError.value = e.message;
                    } finally { loading.value = false; }
                };

                const handleLogout = async () => { await sb.auth.signOut(); session.value = null; };

                // 數據管理
                const loadData = () => {
                    const uid = session.value.user.id;
                    const d = JSON.parse(localStorage.getItem(`fw_db_${uid}`) || '{"clients":[], "sales":[]}');
                    clients.value = d.clients; sales.value = d.sales;
                };
                const saveData = () => {
                    const uid = session.value.user.id;
                    localStorage.setItem(`fw_db_${uid}`, JSON.stringify({ clients: clients.value, sales: sales.value }));
                };

                // POS 邏輯
                const exerciseProducts = [{id:'35pt',name:'35點套票',price:2550},{id:'10pt',name:'10點套票',price:850},{id:'trial',name:'試堂',price:98}];
                const eForm = ref({ clientId: null, type: '35pt', isFirstTime: false, isReferralFree: false });
                
                const exerciseCalc = computed(() => {
                    const f = eForm.value;
                    if (f.type === 'trial') return 98;
                    let p = f.type === '10pt' ? 465 : 1277.5;
                    if (f.isFirstTime) p -= 27;
                    if (f.isReferralFree) p -= 52;
                    return p.toFixed(1);
                });

                const saveExercise = () => {
                    if (!eForm.value.clientId) return alert("請選擇客戶");
                    sales.value.push({ profit: parseFloat(exerciseCalc.value), date: new Date().toISOString() });
                    saveData();
                    currentTab.value = 'dashboard';
                };

                // CRM 邏輯
                const showClientModal = ref(false);
                const cSearch = ref('');
                const clientForm = ref({ id: null, name: '', phone: '', branch: '觀塘', source: '廣告', marathon: false });
                const openClientModal = (c) => {
                    clientForm.value = c ? { ...c } : { id: null, name: '', phone: '', branch: '觀塘', source: '廣告', marathon: false };
                    showClientModal.value = true;
                };
                const saveClient = () => {
                    if (clientForm.value.id) {
                        const i = clients.value.findIndex(x => x.id === clientForm.value.id);
                        clients.value[i] = { ...clientForm.value };
                    } else {
                        clients.value.push({ ...clientForm.value, id: Date.now() });
                    }
                    saveData(); showClientModal.value = false;
                };

                onMounted(async () => {
                    const { data } = await sb.auth.getSession();
                    session.value = data.session;
                    if (session.value) loadData();
                });

                return {
                    session, loading, authState, authError, authForm, handleAuth, handleLogout,
                    currentTab, tabs, clients, sales, eForm, cSearch, showClientModal, clientForm,
                    exerciseProducts, exerciseCalc, openClientModal, saveClient, saveExercise,
                    filteredClients: computed(() => clients.value.filter(c => c.name.includes(cSearch.value))),
                    totalProfit: computed(() => sales.value.reduce((a,b) => a+b.profit, 0)),
                    branchStats: computed(() => { const r={}; clients.value.forEach(c=>r[c.branch]=(r[c.branch]||0)+1); return r; }),
                    marathonStats: computed(() => ({ active: clients.value.filter(c=>c.marathon).length }))
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
