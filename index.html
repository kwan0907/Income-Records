<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitworkhk Management V5.6</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>[v-cloak] { display: none; }</style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">
    <div id="app" v-cloak>
        
        <div v-if="!user" class="min-h-screen flex items-center justify-center bg-blue-700 p-6">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md">
                <h2 class="text-3xl font-black text-center mb-8 text-blue-700 italic tracking-tighter">FITWORKHK LOGIN</h2>
                <input v-model="email" type="email" placeholder="Email" class="w-full border-2 border-slate-100 rounded-2xl px-5 py-4 outline-none focus:border-blue-500 mb-4">
                <button @click="handleLogin" :disabled="loading" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl">獲取連結</button>
            </div>
        </div>

        <div v-else class="min-h-screen pb-24">
            <header class="bg-white border-b sticky top-0 z-50 p-4 flex justify-between items-center">
                <div class="text-xl font-black text-blue-800 italic">FITWORKHK V5.6</div>
                <button @click="logout" class="text-xs font-bold text-red-400">登出</button>
            </header>

            <nav class="flex justify-around bg-white border-b text-[10px] font-black uppercase tracking-widest">
                <button v-for="t in ['dashboard', 'clients', 'add_client', 'add_order']" @click="currentTab = t" :class="{'text-blue-600 border-b-4 border-blue-600': currentTab === t}" class="py-4 px-2">{{ t }}</button>
            </nav>

            <main class="container mx-auto p-4 max-w-2xl">
                
                <section v-if="currentTab === 'dashboard'" class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-blue-600 p-6 rounded-[2rem] text-white">
                            <p class="text-[10px] font-bold opacity-70">預計總利潤</p>
                            <p class="text-3xl font-black italic">${{ totalProfit.toFixed(1) }}</p>
                        </div>
                        <div class="bg-emerald-500 p-6 rounded-[2rem] text-white">
                            <p class="text-[10px] font-bold opacity-70">會員總數</p>
                            <p class="text-3xl font-black italic">{{ clients.length }}</p>
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-[2rem] shadow-sm">
                        <h3 class="font-black italic text-slate-400 mb-4 uppercase">分店分佈 / 馬拉松統計</h3>
                        <div class="grid grid-cols-2 gap-4 text-sm font-bold">
                            <div v-for="(val, branch) in branchStats" class="bg-slate-50 p-3 rounded-xl">
                                {{ branch }}: {{ val }}人
                            </div>
                            <div class="bg-orange-50 p-3 rounded-xl col-span-2 text-orange-600">
                                活躍馬拉松: {{ marathonCount }} 人
                            </div>
                        </div>
                    </div>
                </section>

                <section v-if="currentTab === 'add_client'" class="bg-white p-6 rounded-[2rem] shadow-sm space-y-4">
                    <h2 class="font-black italic text-blue-700">新增客戶資料</h2>
                    <input v-model="cForm.name" placeholder="客戶名字" class="w-full bg-slate-100 p-4 rounded-xl outline-none">
                    <input v-model="cForm.phone" placeholder="電話" class="w-full bg-slate-100 p-4 rounded-xl outline-none">
                    <select v-model="cForm.branch" class="w-full bg-slate-100 p-4 rounded-xl outline-none">
                        <option value="觀塘">觀塘</option>
                        <option value="中環">中環</option>
                        <option value="佐敦">佐敦</option>
                    </select>
                    <select v-model="cForm.source" class="w-full bg-slate-100 p-4 rounded-xl outline-none">
                        <option value="廣告">廣告</option>
                        <option value="轉介紹">轉介紹</option>
                    </select>
                    <div v-if="cForm.source === '轉介紹'" class="bg-blue-50 p-4 rounded-xl">
                        <input v-model="cForm.referrer" placeholder="搜索介紹人名字..." class="w-full bg-white p-2 rounded-lg outline-none text-sm">
                    </div>
                    <div class="flex items-center gap-2 px-2">
                        <input type="checkbox" v-model="cForm.isMarathon"> <span class="text-sm font-bold">加入馬拉松</span>
                    </div>
                    <button @click="saveClient" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl">保存客戶</button>
                </section>

                <section v-if="currentTab === 'add_order'" class="bg-white p-6 rounded-[2rem] shadow-sm space-y-4">
                    <h2 class="font-black italic text-blue-700">新增銷售/套票</h2>
                    <select v-model="oForm.clientId" class="w-full bg-slate-100 p-4 rounded-xl outline-none">
                        <option v-for="c in clients" :value="c.id">{{ c.name }}</option>
                    </select>
                    <select v-model="oForm.type" class="w-full bg-slate-100 p-4 rounded-xl outline-none">
                        <option value="10pt">10點套票 ($850)</option>
                        <option value="35pt">35點套票 ($2550)</option>
                        <option value="trial">試堂 ($98)</option>
                    </select>
                    <div class="flex items-center gap-2 px-2 text-xs font-bold text-red-500">
                        <input type="checkbox" v-model="oForm.isFirstTime"> 新客戶開35點 (減$98)
                    </div>
                    <button @click="addOrder" class="w-full bg-emerald-600 text-white font-black py-4 rounded-xl">計算並儲存收入</button>
                </section>

                <section v-if="currentTab === 'clients'" class="space-y-4">
                    <div v-for="c in clients" :key="c.id" class="bg-white p-5 rounded-2xl shadow-sm border-l-8 border-blue-500">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-black text-lg">{{ c.name }} <span v-if="c.isMarathon" class="text-[10px] bg-orange-100 text-orange-500 px-2 rounded">馬拉松</span></h3>
                                <p class="text-[10px] font-bold text-slate-400">{{ c.phone }} | {{ c.branch }} | {{ c.source }}</p>
                                <p class="text-[10px] text-blue-400">到期日: {{ c.expiryDate }}</p>
                            </div>
                            <button @click="extendExpiry(c)" class="text-[10px] font-bold border px-2 py-1 rounded">延期一年</button>
                        </div>
                    </div>
                </section>

            </main>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted, computed } = Vue;

        createApp({
            setup() {
                const user = ref(null);
                const currentTab = ref('dashboard');
                const clients = ref(JSON.parse(localStorage.getItem('fit_clients') || '[]'));
                const orders = ref(JSON.parse(localStorage.getItem('fit_orders') || '[]'));
                
                // 表單模型
                const cForm = ref({ name: '', phone: '', branch: '中環', source: '廣告', isMarathon: false, referrer: '' });
                const oForm = ref({ clientId: null, type: '10pt', isFirstTime: false });

                // 利潤計算核心邏輯
                const calculateProfit = (order) => {
                    const client = clients.value.find(c => c.id === order.clientId);
                    const isReferral = client?.source === '轉介紹';
                    
                    if (order.type === '10pt') {
                        // 利潤: $465 (一般) / $413 (轉介紹)
                        return isReferral ? 413 : 465;
                    }
                    if (order.type === '35pt') {
                        // 新開利潤 $1250.5 (扣$98) / 續卡 $1277.5
                        return order.isFirstTime ? 1250.5 : 1277.5;
                    }
                    return 0;
                };

                const totalProfit = computed(() => orders.value.reduce((sum, o) => sum + calculateProfit(o), 0));
                const marathonCount = computed(() => clients.value.filter(c => c.isMarathon).length);
                const branchStats = computed(() => {
                    const stats = { '中環': 0, '觀塘': 0, '佐敦': 0 };
                    clients.value.forEach(c => stats[c.branch]++);
                    return stats;
                });

                // 功能方法
                const saveClient = () => {
                    const newClient = { 
                        ...cForm.value, 
                        id: Date.now(), 
                        expiryDate: new Date(new Date().setFullYear(new Date().getFullYear() + 1)).toLocaleDateString() 
                    };
                    clients.value.push(newClient);
                    localStorage.setItem('fit_clients', JSON.stringify(clients.value));
                    currentTab.value = 'clients';
                    // 清空表單
                    cForm.value = { name: '', phone: '', branch: '中環', source: '廣告', isMarathon: false, referrer: '' };
                };

                const addOrder = () => {
                    orders.value.push({ ...oForm.value, id: Date.now(), date: new Date().toLocaleDateString() });
                    localStorage.setItem('fit_orders', JSON.stringify(orders.value));
                    alert("收入已記錄");
                    currentTab.value = 'dashboard';
                };

                const extendExpiry = (c) => {
                    c.expiryDate = new Date(new Date(c.expiryDate).setFullYear(new Date(c.expiryDate).getFullYear() + 1)).toLocaleDateString();
                    localStorage.setItem('fit_clients', JSON.stringify(clients.value));
                };

                // Supabase 配置
                const client = supabase.createClient("https://ajnunehxtiofcphdyhqn.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqbnVuZWh4dGlvZmNwaGR5aHFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMzk4MzcsImV4cCI6MjA5MTcxNTgzN30.vn74xMzEm-fj7Gzhosxvn5UQWozAf_8LrDHXG3kycT4");

                onMounted(() => {
                    client.auth.onAuthStateChange((_e, session) => user.value = session?.user || null);
                });

                return { 
                    user, currentTab, cForm, oForm, clients, orders, totalProfit, marathonCount, branchStats,
                    saveClient, addOrder, extendExpiry,
                    handleLogin: async () => { /* 保持之前的 OTP 邏輯 */ },
                    logout: async () => { await client.auth.signOut(); user.value = null; }
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
