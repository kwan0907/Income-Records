<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitworkhk 雲端管理系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>[v-cloak] { display: none; }</style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="app" v-cloak>
        
        <div v-if="!user" class="min-h-screen flex items-center justify-center p-6 bg-blue-900">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md">
                <h2 class="text-3xl font-black text-center mb-6 text-blue-900 italic tracking-tighter">FITWORKHK</h2>
                
                <div v-if="showResetPasswordInput" class="space-y-6 text-center">
                    <div class="bg-orange-50 p-4 rounded-2xl border border-orange-100">
                        <p class="text-orange-600 font-black text-sm uppercase italic">Step: Reset Password</p>
                        <p class="text-slate-500 text-xs mt-1">請設置您的新登入密碼</p>
                    </div>
                    <div>
                        <input v-model="newPassword" type="password" placeholder="輸入新密碼 (至少 6 位)" 
                               class="w-full border-2 border-orange-400 rounded-2xl px-4 py-4 outline-none focus:ring-2 ring-orange-200">
                    </div>
                    <button @click="updatePassword" :disabled="loading" 
                            class="w-full bg-orange-600 text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-transform disabled:bg-gray-300">
                        {{ loading ? '更新中...' : '確認更新並進入系統' }}
                    </button>
                </div>

                <div v-else-if="showOtpInput" class="space-y-6 text-center">
                    <div class="bg-blue-50 p-4 rounded-2xl">
                        <p class="text-blue-600 font-bold text-xs">驗證碼已發送至 {{ email }}</p>
                    </div>
                    <input v-model="otpToken" type="text" maxlength="6" placeholder="000000" class="w-full text-center text-5xl font-black tracking-[0.5rem] border-b-4 border-blue-500 py-4 outline-none bg-transparent text-blue-900">
                    <button @click="verifyOtp" class="w-full bg-green-500 text-white font-black py-4 rounded-2xl shadow-xl">確認驗證</button>
                </div>

                <div v-else class="space-y-4">
                    <p class="text-center text-gray-400 text-[10px] font-bold uppercase tracking-widest">{{ authModeText }}</p>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 px-1 uppercase">Email Address</label>
                        <input v-model="email" type="email" placeholder="example@email.com" class="w-full border-2 border-gray-100 rounded-2xl px-4 py-4 outline-none focus:border-blue-500 transition-all">
                    </div>
                    <div v-if="authMode !== 'reset'">
                        <label class="text-[10px] font-bold text-gray-400 px-1 uppercase">Password</label>
                        <input v-model="password" type="password" placeholder="••••••••" class="w-full border-2 border-gray-100 rounded-2xl px-4 py-4 outline-none focus:border-blue-500">
                    </div>
                    <button @click="handleAuth" :disabled="loading" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl mt-4 active:scale-95 transition-all">
                        {{ loading ? '處理中...' : authButtonText }}
                    </button>
                    <div class="flex justify-between px-2 text-xs font-bold mt-4">
                        <button v-if="authMode === 'login'" @click="authMode = 'signup'" class="text-blue-500">註冊新帳號</button>
                        <button v-if="authMode === 'login'" @click="authMode = 'reset'" class="text-gray-400">忘記密碼？</button>
                        <button v-if="authMode !== 'login'" @click="authMode = 'login'" class="text-blue-500 w-full text-center">返回登入</button>
                    </div>
                </div>
            </div>
        </div>

        <div v-else class="min-h-screen">
            <header class="bg-white p-4 shadow-sm flex justify-between items-center sticky top-0 z-10 border-b border-gray-100">
                <span class="font-black text-blue-600 text-xl tracking-tighter">FITWORKHK</span>
                <button @click="logout" class="bg-red-50 text-red-500 px-4 py-2 rounded-xl text-xs font-black">登出</button>
            </header>
            <main class="p-6 max-w-md mx-auto text-center">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100">
                    <h1 class="text-2xl font-black text-blue-900">登入成功</h1>
                    <p class="text-gray-400 text-xs mt-2">{{ user.email }}</p>
                </div>
            </main>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ajnunehxtiofcphdyhqn.supabase.co".trim();
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqbnVuZWh4dGlvZmNwaGR5aHFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMzk4MzcsImV4cCI6MjA5MTcxNTgzN30.vn74xMzEm-fj7Gzhosxvn5UQWozAf_8LrDHXG3kycT4".trim();
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
            auth: { persistSession: true, autoRefreshToken: true }
        });

        const { createApp, ref, computed, onMounted } = Vue;
        createApp({
            setup() {
                const user = ref(null);
                const email = ref('');
                const password = ref('');
                const newPassword = ref('');
                const otpToken = ref('');
                const loading = ref(false);
                const authMode = ref('login');
                const showOtpInput = ref(false);
                const showResetPasswordInput = ref(false);

                const authModeText = computed(() => {
                    if (authMode.value === 'login') return 'System Access';
                    if (authMode.value === 'signup') return 'New Member';
                    return 'Password Recovery';
                });

                const authButtonText = computed(() => {
                    if (authMode.value === 'login') return '登入系統';
                    if (authMode.value === 'signup') return '獲取驗證碼';
                    return '發送重設郵件';
                });

                const handleAuth = async () => {
                    if (!email.value) return alert("請輸入 Email");
                    loading.value = true;
                    try {
                        if (authMode.value === 'login') {
                            const { error } = await _supabase.auth.signInWithPassword({ email: email.value, password: password.value });
                            if (error) throw error;
                        } else if (authMode.value === 'signup') {
                            const { error } = await _supabase.auth.signUp({ email: email.value, password: password.value });
                            if (error) throw error;
                            showOtpInput.value = true;
                        } else if (authMode.value === 'reset') {
                            const { error } = await _supabase.auth.resetPasswordForEmail(email.value, { 
                                redirectTo: window.location.origin 
                            });
                            if (error) throw error;
                            alert("郵件已發送！請去 Gmail 點擊連結。");
                        }
                    } catch (err) { alert(err.message); } finally { loading.value = false; }
                };

                const verifyOtp = async () => {
                    loading.value = true;
                    const { error } = await _supabase.auth.verifyOtp({ email: email.value, token: otpToken.value, type: 'signup' });
                    if (error) alert(error.message);
                    loading.value = false;
                };

                const updatePassword = async () => {
                    if (newPassword.value.length < 6) return alert("密碼至少 6 位");
                    loading.value = true;
                    try {
                        const { error } = await _supabase.auth.updateUser({ password: newPassword.value });
                        if (error) throw error;
                        alert("密碼更換成功！");
                        showResetPasswordInput.value = false;
                        window.location.hash = ""; // 清理網址
                    } catch (err) { alert(err.message); } finally { loading.value = false; }
                };

                const logout = async () => { 
                    await _supabase.auth.signOut(); 
                    user.value = null; 
                    window.location.hash = "";
                    location.reload();
                };

                onMounted(async () => {
                    // 1. 先確認是否有現有登入
                    const { data: { session } } = await _supabase.auth.getSession();
                    if (session) user.value = session.user;

                    // 2. 強力偵測：不管是 Hash 還是事件，只要看到 recovery 就切換
                    const checkUrl = () => {
                        const hash = window.location.hash;
                        // 如果網址包含 recovery 類型或 accessToken，強制顯示修改介面
                        if (hash.includes("type=recovery") || hash.includes("access_token=")) {
                            console.log("偵測到重設密碼訊號");
                            showResetPasswordInput.value = true;
                        }
                    };

                    // 延遲 500ms 檢查網址，確保連結完全載入
                    setTimeout(checkUrl, 500);

                    // 3. 監聽狀態改變
                    _supabase.auth.onAuthStateChange((event, session) => {
                        console.log("Auth Event:", event);
                        if (event === "PASSWORD_RECOVERY") showResetPasswordInput.value = true;
                        if (session) user.value = session.user;
                        else user.value = null;
                    });
                });

                return { user, email, password, newPassword, otpToken, loading, authMode, showOtpInput, showResetPasswordInput, authModeText, authButtonText, handleAuth, verifyOtp, updatePassword, logout };
            }
        }).mount('#app');
    </script>
</body>
</html>
