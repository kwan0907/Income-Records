<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitworkhk 雲端管理系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>[v-cloak] { display: none; }</style>
</head>
<body class="bg-slate-50">
    <div id="app" v-cloak>
        
        <div v-if="!user" class="min-h-screen flex items-center justify-center p-6 bg-blue-900">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md">
                <h2 class="text-3xl font-black text-center mb-2 text-blue-900 uppercase">Fitworkhk</h2>
                
                <div v-if="!showOtpInput && !showResetPasswordInput" class="space-y-4">
                    <p class="text-center text-gray-400 text-[10px] mb-8 font-bold uppercase tracking-widest">{{ authModeText }}</p>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 px-1">電子郵件</label>
                        <input v-model="email" type="email" placeholder="example@email.com" class="w-full border-2 border-gray-100 rounded-2xl px-4 py-4 outline-none focus:border-blue-500">
                    </div>
                    <div v-if="authMode !== 'reset'">
                        <label class="text-[10px] font-bold text-gray-400 px-1">密碼</label>
                        <input v-model="password" type="password" placeholder="••••••••" class="w-full border-2 border-gray-100 rounded-2xl px-4 py-4 outline-none focus:border-blue-500">
                    </div>
                    <button @click="handleAuth" :disabled="loading" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl mt-4">
                        {{ loading ? '處理中...' : authButtonText }}
                    </button>
                    <div class="flex justify-between px-2 text-xs font-bold mt-4">
                        <button v-if="authMode === 'login'" @click="authMode = 'signup'" class="text-blue-500">註冊新帳號</button>
                        <button v-if="authMode === 'login'" @click="authMode = 'reset'" class="text-gray-400">忘記密碼？</button>
                        <button v-if="authMode !== 'login'" @click="authMode = 'login'" class="text-blue-500 w-full text-center">返回登入</button>
                    </div>
                </div>

                <div v-else-if="showOtpInput" class="space-y-6 text-center">
                    <p class="text-blue-600 font-bold text-sm">驗證碼已發送至 {{ email }}</p>
                    <input v-model="otpToken" type="text" maxlength="6" placeholder="000000" class="w-full text-center text-5xl font-black tracking-[0.5rem] border-b-4 border-blue-500 py-4 outline-none bg-transparent">
                    <button @click="verifyOtp" class="w-full bg-green-500 text-white font-black py-4 rounded-2xl shadow-xl">確認驗證</button>
                    <button @click="showOtpInput = false" class="text-xs font-bold text-gray-400">返回修改</button>
                </div>

                <div v-else-if="showResetPasswordInput" class="space-y-6 text-center">
                    <p class="text-blue-600 font-bold text-sm">設置您的新密碼</p>
                    <input v-model="newPassword" type="password" placeholder="輸入新密碼" class="w-full border-2 border-gray-100 rounded-2xl px-4 py-4 outline-none focus:border-blue-500">
                    <button @click="updatePassword" class="w-full bg-orange-500 text-white font-black py-4 rounded-2xl shadow-xl">更新密碼並登入</button>
                </div>
            </div>
        </div>

        <div v-else class="min-h-screen">
            <header class="bg-white p-4 shadow-sm flex justify-between items-center">
                <span class="font-black text-blue-600">FITWORKHK</span>
                <button @click="logout" class="text-xs font-bold text-red-400">登出</button>
            </header>
            <main class="p-8 text-center">
                <div class="bg-green-100 text-green-700 p-4 rounded-2xl font-bold mb-4">✅ 登入成功</div>
                <p class="text-gray-500">用戶：{{ user.email }}</p>
            </main>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ajnunehxtiofcphdyhqn.supabase.co".trim();
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqbnVuZWh4dGlvZmNwaGR5aHFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMzk4MzcsImV4cCI6MjA5MTcxNTgzN30.vn74xMzEm-fj7Gzhosxvn5UQWozAf_8LrDHXG3kycT4".trim();
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const { createApp, ref, computed, onMounted } = Vue;
        createApp({
            setup() {
                const user = ref(null);
                const email = ref('');
                const password = ref('');
                const newPassword = ref('');
                const otpToken = ref('');
                const loading = ref(false);
                const authMode = ref('login');
                const showOtpInput = ref(false);
                const showResetPasswordInput = ref(false);

                const authModeText = computed(() => {
                    if (authMode.value === 'login') return 'System Login';
                    if (authMode.value === 'signup') return 'Registration';
                    return 'Reset Password';
                });

                const authButtonText = computed(() => {
                    if (authMode.value === 'login') return '進入系統';
                    if (authMode.value === 'signup') return '獲取驗證碼';
                    return '發送重設郵件';
                });

                const handleAuth = async () => {
                    if (!email.value) return alert("請輸入 Email");
                    loading.value = true;
                    try {
                        if (authMode.value === 'login') {
                            const { data, error } = await _supabase.auth.signInWithPassword({ email: email.value, password: password.value });
                            if (error) throw error;
                            user.value = data.user;
                        } else if (authMode.value === 'signup') {
                            const { error } = await _supabase.auth.signUp({ email: email.value, password: password.value });
                            if (error) throw error;
                            showOtpInput.value = true;
                        } else if (authMode.value === 'reset') {
                            // 發送重設郵件，確保 redirectTo 指向你的網站網址
                            const { error } = await _supabase.auth.resetPasswordForEmail(email.value, { 
                                redirectTo: window.location.origin 
                            });
                            if (error) throw error;
                            alert("請檢查郵箱，點擊郵件中的連結來重設密碼。");
                        }
                    } catch (err) { alert(err.message); } finally { loading.value = false; }
                };

                const verifyOtp = async () => {
                    const { data, error } = await _supabase.auth.verifyOtp({ email: email.value, token: otpToken.value, type: 'signup' });
                    if (error) alert(error.message); else user.value = data.user;
                };

                // 更新新密碼的功能
                const updatePassword = async () => {
                    if (!newPassword.value) return alert("請輸入新密碼");
                    loading.value = true;
                    try {
                        const { error } = await _supabase.auth.updateUser({ password: newPassword.value });
                        if (error) throw error;
                        alert("密碼更新成功！已為您自動登入。");
                        const { data: { user: _user } } = await _supabase.auth.getUser();
                        user.value = _user;
                        showResetPasswordInput.value = false;
                    } catch (err) { alert(err.message); } finally { loading.value = false; }
                };

                const logout = async () => { await _supabase.auth.signOut(); user.value = null; window.location.hash = ""; };

                onMounted(async () => {
                    // 1. 檢查是否已經登入
                    const { data: { user: _user } } = await _supabase.auth.getUser();
                    if (_user) { user.value = _user; }

                    // 2. 監聽網址 Hash (如果是從重設密碼郵件跳轉回來的)
                    _supabase.auth.onAuthStateChange((event, session) => {
                        if (event === "PASSWORD_RECOVERY") {
                            showResetPasswordInput.value = true;
                        }
                    });
                });

                return { user, email, password, newPassword, otpToken, loading, authMode, showOtpInput, showResetPasswordInput, authModeText, authButtonText, handleAuth, verifyOtp, updatePassword, logout };
            }
        }).mount('#app');
    </script>
</body>
</html>
