<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitworkhk 客戶管理系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>[v-cloak] { display: none; }</style>
</head>
<body class="bg-slate-50">
    <div id="app" v-cloak>
        
        <div v-if="!user" class="min-h-screen flex items-center justify-center p-6 bg-blue-900">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md">
                <h2 class="text-3xl font-black text-center mb-2 text-blue-900">FITWORKHK</h2>
                <p class="text-center text-gray-400 text-xs mb-8 font-bold uppercase">{{ authModeText }}</p>

                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 px-1">電子郵件</label>
                        <input v-model="email" type="email" class="w-full border-2 border-gray-100 rounded-2xl px-4 py-4 outline-none focus:border-blue-500">
                    </div>

                    <div v-if="authMode !== 'reset'">
                        <label class="text-[10px] font-bold text-gray-400 px-1">登入密碼</label>
                        <input v-model="password" type="password" class="w-full border-2 border-gray-100 rounded-2xl px-4 py-4 outline-none focus:border-blue-500">
                    </div>

                    <button @click="handleAuth" :disabled="loading" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl mt-4">
                        {{ loading ? '處理中...' : authButtonText }}
                    </button>

                    <div class="flex justify-between px-2 text-xs font-bold mt-4">
                        <button v-if="authMode === 'login'" @click="authMode = 'signup'" class="text-blue-500">申請帳號</button>
                        <button v-if="authMode === 'login'" @click="authMode = 'reset'" class="text-gray-400">忘記密碼？</button>
                        <button v-if="authMode !== 'login'" @click="authMode = 'login'" class="text-blue-500 w-full text-center">返回登入</button>
                    </div>
                </div>
            </div>
        </div>

        <div v-else class="min-h-screen">
            <header class="bg-white p-4 shadow-sm flex justify-between items-center sticky top-0">
                <span class="font-black text-blue-600 text-xl">FITWORKHK</span>
                <button @click="logout" class="text-xs font-bold text-red-400">登出系統</button>
            </header>
            <main class="p-6 text-center">
                <h1 class="text-2xl font-black text-blue-900">歡迎回來</h1>
                <p class="text-gray-400 mt-2">{{ user.email }}</p>
                </main>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ajnunehxtiofcphdyhqn.supabase.co";
        const SUPABASE_KEY = "你的_ANON_KEY"; // 這裡請填入你剛才拿到的那一長串 Key
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const { createApp, ref, computed, onMounted } = Vue;
        createApp({
            setup() {
                const user = ref(null);
                const email = ref('');
                const password = ref('');
                const loading = ref(false);
                const authMode = ref('login'); // login, signup, reset

                const authModeText = computed(() => {
                    if (authMode.value === 'login') return 'Cloud Login';
                    if (authMode.value === 'signup') return 'Create Account';
                    return 'Reset Password';
                });

                const authButtonText = computed(() => {
                    if (authMode.value === 'login') return '確認登入';
                    if (authMode.value === 'signup') return '立即註冊';
                    return '發送重設郵件';
                });

                const handleAuth = async () => {
                    if (!email.value) return alert("請輸入 Email");
                    loading.value = true;

                    try {
                        if (authMode.value === 'login') {
                            const { data, error } = await _supabase.auth.signInWithPassword({ email: email.value, password: password.value });
                            if (error) throw error;
                            user.value = data.user;
                        } else if (authMode.value === 'signup') {
                            const { error } = await _supabase.auth.signUp({ email: email.value, password: password.value });
                            if (error) throw error;
                            alert("註冊成功！請檢查你的 Email 收取確認信。");
                            authMode.value = 'login';
                        } else if (authMode.value === 'reset') {
                            const { error } = await _supabase.auth.resetPasswordForEmail(email.value, {
                                redirectTo: window.location.href, // 重設完跳回本頁
                            });
                            if (error) throw error;
                            alert("重設連結已發送至你的 Email！");
                        }
                    } catch (err) {
                        alert("操作失敗: " + err.message);
                    } finally {
                        loading.value = false;
                    }
                };

                const logout = async () => { await _supabase.auth.signOut(); user.value = null; };

                onMounted(async () => {
                    const { data: { user: _user } } = await _supabase.auth.getUser();
                    if (_user) user.value = _user;
                });

                return { user, email, password, loading, authMode, authModeText, authButtonText, handleAuth, logout };
            }
        }).mount('#app');
    </script>
</body>
</html>
